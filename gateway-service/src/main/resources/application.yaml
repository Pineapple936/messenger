server:
  port: 8080

INTERNAL_API_KEY: internal_api_key

spring:
  codec:
    max-in-memory-size: 52MB
  data:
    redis:
      host: localhost
      port: 6380
      password: ${REDIS_PASSWORD:password}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${GATEWAY_KAFKA_GROUP_ID:gateway-message-delivery}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.value.default.type: messenger.commonlibs.dto.messageservice.MessageDto
        spring.json.use.type.headers: false
        spring.json.trusted.packages: messenger.commonlibs.dto.messageservice
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth_route
              uri: ${AUTH_SERVICE_URI:${AUTH_SERVICE_URL:http://localhost:8081}}
              predicates:
                - Path=/auth/**
              filters:
                - AddRequestHeader=X-Internal-Api-Key, ${INTERNAL_API_KEY:internal_api_key}
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@authIpKeyResolver}"
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
            - id: user_route
              uri: ${USER_SERVICE_URI:${USER_SERVICE_URL:http://localhost:8082}}
              predicates:
                - Path=/user/**
              filters:
                - AddRequestHeader=X-Internal-Api-Key, ${INTERNAL_API_KEY:internal_api_key}
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIdKeyResolver}"
                    redis-rate-limiter.replenishRate: 30
                    redis-rate-limiter.burstCapacity: 60
            - id: chat_route
              uri: ${CHAT_SERVICE_URI:${CHAT_SERVICE_URL:http://localhost:8083}}
              predicates:
                - Path=/chat/**
              filters:
                - AddRequestHeader=X-Internal-Api-Key, ${INTERNAL_API_KEY:internal_api_key}
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIdKeyResolver}"
                    redis-rate-limiter.replenishRate: 30
                    redis-rate-limiter.burstCapacity: 60
            - id: message_route
              uri: ${MESSAGE_SERVICE_URI:${MESSAGE_SERVICE_URL:http://localhost:8084}}
              predicates:
                - Path=/message/**
              filters:
                - AddRequestHeader=X-Internal-Api-Key, ${INTERNAL_API_KEY:internal_api_key}
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIdKeyResolver}"
                    redis-rate-limiter.replenishRate: 30
                    redis-rate-limiter.burstCapacity: 60
            - id: reaction_route
              uri: ${REACTION_SERVICE_URI:${REACTION_SERVICE_URL:http://localhost:8085}}
              predicates:
                - Path=/reaction/**
              filters:
                - AddRequestHeader=X-Internal-Api-Key, ${INTERNAL_API_KEY:internal_api_key}
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIdKeyResolver}"
                    redis-rate-limiter.replenishRate: 30
                    redis-rate-limiter.burstCapacity: 60
            - id: media_route
              uri: ${MEDIA_SERVICE_URI:${MEDIA_SERVICE_URL:http://localhost:8086}}
              predicates:
                - Path=/media/**
              filters:
                - AddRequestHeader=X-Internal-Api-Key, ${INTERNAL_API_KEY:internal_api_key}
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIdKeyResolver}"
                    redis-rate-limiter.replenishRate: 30
                    redis-rate-limiter.burstCapacity: 60


gateway:
  kafka:
    topic:
      messageEvents: gateway-message-events
      reactionEvents: gateway-reaction-events
