services:
  redis:
    image: redis:latest
    container_name: gateway_service_redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "password" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  message_service_mongodb_data:
  redis-data:
